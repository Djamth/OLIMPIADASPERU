spring.application.name=olimpiadas
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# =========================
# BASE DE DATOS
# =========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO}
spring.jpa.show-sql=${JPA_SHOW_SQL}
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT}
spring.jpa.open-in-view=false

# =========================
# MIGRACIONES
# =========================
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# =========================
# DATOS DE DEMOSTRACION
# =========================
app.demo-data.enabled=${DEMO_DATA_ENABLED:true}

# =========================
# SERVIDOR
# =========================
server.port=${SERVER_PORT}
server.servlet.context-path=${SERVER_CONTEXT_PATH}

# =========================
# SEGURIDAD JWT
# =========================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}

# =========================
# CORS
# =========================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# =========================
# CORREO
# =========================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE}

# =========================
# RECUPERACION DE PASSWORD
# =========================
app.frontend.reset-password-url=${APP_FRONTEND_RESET_PASSWORD_URL}
app.password-reset.expiration-minutes=${PASSWORD_RESET_EXPIRATION_MINUTES}

# =========================
# COOKIES DE AUTENTICACION
# =========================
app.auth.cookie.secure=${AUTH_COOKIE_SECURE:false}
app.auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:Strict}
app.auth.cookie.path=${AUTH_COOKIE_PATH:${SERVER_CONTEXT_PATH}}

# =========================
# LIMITACION DE INTENTOS
# =========================
app.security.rate-limit.login.max-attempts=${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
app.security.rate-limit.login.window-minutes=${LOGIN_RATE_LIMIT_WINDOW_MINUTES:15}
app.security.rate-limit.password.max-attempts=${PASSWORD_RATE_LIMIT_MAX_ATTEMPTS:3}
app.security.rate-limit.password.window-minutes=${PASSWORD_RATE_LIMIT_WINDOW_MINUTES:30}
