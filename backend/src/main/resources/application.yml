spring:
  application:
    name: olimpiadas-peru
  datasource:
    url: jdbc:postgresql://localhost:5432/olimpiadas_peru
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

app:
  security:
    jwt:
      secret: 4b7c3bdf5f9a7240d34f9d331f8be91f2e1ac611b66d8d4b96795d07c2f7b9b6
      expiration: 86400000
